<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP FANI | Acesso ao Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --boticario-dark: #004D3B;
            --boticario-light: #00684E;
            --boticario-gold: #C5A059;
        }
 
        body { background: linear-gradient(135deg, var(--boticario-dark) 0%, #002B22 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        
        .login-card { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); overflow: hidden; width: 100%; max-width: 420px; margin: auto; }
        .login-header { background: white; padding: 36px 36px 24px; text-align: center; border-bottom: 3px solid var(--boticario-gold); }
        .login-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--boticario-dark), var(--boticario-light)); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 8px 20px rgba(0, 77, 59, 0.3); }
 
        .form-label { font-size: 0.75rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { border-radius: 10px; border: 1px solid #D8D8D8; font-size: 0.9rem; padding: 10px 14px; }
        .form-control:focus { border-color: var(--boticario-light); box-shadow: 0 0 0 0.2rem rgba(0, 104, 78, 0.15); }

        .input-group-text { border-radius: 10px 0 0 10px; border: 1px solid #D8D8D8; background: #F9F5F1; border-right: none; }
        .input-group .form-control { border-radius: 0 10px 10px 0; border-left: none; }
 
        .btn-boticario { background: linear-gradient(90deg, var(--boticario-dark), var(--boticario-light)); color: white; border: none; padding: 12px; font-weight: 700; border-radius: 10px; transition: all 0.3s; letter-spacing: 0.5px; }
        .btn-boticario:hover { background: linear-gradient(90deg, #003328, var(--boticario-dark)); color: var(--boticario-gold); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 77, 59, 0.3); }
    </style>
</head>
<body>
 
<div class="container">
    <div class="login-card">
 
        <div class="login-header">
            <div class="login-logo-icon">
                <i class="fa-solid fa-leaf fa-lg text-white"></i>
            </div>
            <h4 class="fw-bold mb-1" style="color: var(--boticario-dark);">CP FANI</h4>
            <p class="text-muted small mb-0 fw-semibold" style="letter-spacing: 1px;">SISTEMA DE GESTÃO DE PESSOAS</p>
        </div>
 
        <div class="card-body p-4">
 
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show small rounded-3" role="alert">
                            <i class="fa-solid fa-circle-exclamation me-2"></i> {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
 
            <form action="{{ url_for('login') }}" method="POST">
                {{ csrf_token() }}
                
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" name="username" class="form-control"
                               placeholder="Seu usuário de acesso" required autocomplete="username">
                    </div>
                </div>
 
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control"
                               placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
 
                <button type="submit" class="btn btn-boticario w-100 shadow-sm">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>ACESSAR SISTEMA
                </button>
            </form>
        </div>
 
        <div class="card-footer bg-light text-center py-3 border-0">
            <small class="text-muted">Acesso restrito a colaboradores autorizados.</small>
        </div>
 
    </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
