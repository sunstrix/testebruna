# =============================================================================
# RENDER.COM - CONFIGURAÇÃO DE DEPLOY
# Essência RH - CP FANI
# =============================================================================

services:
  - type: web
    name: essencia-rh-cpfani
    env: python
    region: oregon
    plan: free
    branch: main
    
    buildCommand: pip install -r requirements.txt
    
    # CORREÇÃO BUG 10: Adicionado --workers 2 e --timeout 120 para evitar timeout 502
    # nas chamadas ao Google Sheets API (que podem demorar mais de 30s)
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    
    envVars:
      # -------------------------------------------------------------------------
      # SEGURANÇA DA APLICAÇÃO
      # -------------------------------------------------------------------------
      - key: SECRET_KEY
        generateValue: true
        sync: false
      
      # -------------------------------------------------------------------------
      # GOOGLE SHEETS API (Persistência de Dados)
      # -------------------------------------------------------------------------
      - key: GOOGLE_SHEETS_ID
        sync: false
      
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      
      # -------------------------------------------------------------------------
      # INTEGRAÇÕES OPCIONAIS (Descomente se necessário)
      # -------------------------------------------------------------------------
      # Telegram Bot
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # 
      # - key: TELEGRAM_CHAT_ID
      #   sync: false
      
      # Gmail SMTP
      # CORREÇÃO BUG 5: Comentada a linha "sync: false" órfã que causava YAML inválido
      # - key: EMAIL_USER
      #   sync: false
      # 
      # - key: EMAIL_PASS
      #   sync: false
      
      # -------------------------------------------------------------------------
      # CONFIGURAÇÕES GERAIS
      # -------------------------------------------------------------------------
      - key: FLASK_ENV
        value: production
      
      - key: PYTHON_VERSION
        value: 3.11.0